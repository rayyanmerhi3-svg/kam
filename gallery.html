<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gallery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    body{
      font-family:'Inter',sans-serif;
      background:#0f0f0f;
      color:white;
    }

    /* Navbar */

    .navbar{
      background:rgba(0,0,0,0.85);
      backdrop-filter:blur(10px);
      padding:8px 0;
    }

    .navbar-brand{
      font-family:'Cormorant+Garamond',serif;
      color:#dc2626 !important;
      font-size:28px;
      font-weight:700;
    }

    .nav-link{
      color:white !important;
      margin-left:12px;
    }

    .nav-link:hover{
      color:#dc2626 !important;
    }

    /* Hero */

    .hero{
      height:50vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;

      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
      url('gallery.jpg');

      background-size:cover;
      background-position:center;
    }

    .hero h1{
      font-family:'Cormorant Garamond',serif;
      font-size:60px;
      color:#dc2626;
    }

    /* Gallery */

    .section{
      padding:80px 20px;
    }

    .gallery-img{
      width:100%;
      height:250px;
      object-fit:cover;
      border-radius:15px;
      transition:0.3s;
    }

    .gallery-img:hover{
      transform:scale(1.05);
      box-shadow:0 10px 25px rgba(220,38,38,0.3);
    }

    footer{
      text-align:center;
      padding:25px;
      border-top:1px solid rgba(255,255,255,0.1);
      color:#888;
    }

  </style>

</head>
<body>

  <!-- Navbar -->

  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

    <div class="container">

      <a class="navbar-brand" href="index.html">
        Path of Karbala
      </a>

      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="karbala.html">Karbala</a></li>
          <li class="nav-item"><a class="nav-link" href="ahlulbayt.html">Ahl al-Bayt</a></li>
          <li class="nav-item"><a class="nav-link" href="quotes.html">Quotes</a></li>
          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- Hero -->

  <section class="hero">

    <div>
      <h1>Gallery</h1>
      <p>Images inspired by Karbala, faith, and Islamic history.</p>
    </div>

  </section>

  <!-- Gallery -->

  <section class="section">

    <div class="container">

      <div class="row g-4">

        <div class="col-md-4">
          <img src="hrse.jpg" class="gallery-img">
        </div>

        <div class="col-md-4">
          <img src="kafel.jpg" class="gallery-img">
        </div>

        <div class="col-md-4">
          <img src="zynb.jpg" class="gallery-img">
        </div>

        <div class="col-md-4">
          <img src="a.jpg" class="gallery-img">
        </div>

        <div class="col-md-4">
          <img src="abufadel.jpg" class="gallery-img">
        </div>

        <div class="col-md-4">
          <img src="akbar.jpg" class="gallery-img">
        </div>

      </div>

    </div>

  </section>

  <!-- Footer -->

  <footer>
    © 2026 Path of Karbala
  </footer>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
